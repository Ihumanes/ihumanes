Actúa como un diseñador web senior y experto en gestión de proyectos IT.
Genera una página web completa en HTML (con CSS embebido y un poco de JavaScript si es necesario) para una presentación tipo kickoff de un proyecto corporativo.

Contexto del proyecto

Se trata de la implantación y despliegue de una herramienta de gestión de proyectos que sustituirá el uso actual de Excel.
El objetivo es industrializar la gestión de proyectos mediante un entorno colaborativo, estructurado y escalable.

Objetivos de la página

La página debe ser visual, moderna y pensada para presentar en una reunión ejecutiva o de equipos.
Debe poder alojarse en GitHub Pages (HTML estático).

